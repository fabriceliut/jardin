[build]
  # Netlify builds the Jekyll site automatically on every push.
  command = "bundle install && bundle exec jekyll build"
  publish = "_site"

[build.environment]
  RUBY_VERSION = "3.3.0"
  NODE_VERSION = "22"

# --- Cache headers ---
# HTML: always revalidate (Netlify CDN clears on every deploy)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS and search index: 1-day browser cache — CDN is cleared on each deploy
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/search.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    Content-Type = "application/json; charset=utf-8"

# Images and other binary assets: 30-day cache (filenames rarely change)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=604800"

# RSS feed: 1-hour cache
[[headers]]
  for = "/feed.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
