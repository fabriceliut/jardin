<!DOCTYPE html>
<html lang="fr">
  {% include head.html %}
  <body>
    <a class="skip-link" href="#main">Aller au contenu</a>
    <nav class="site-nav">{% include nav.html %}</nav>
    <div class="wrapper">
      <main id="main">{{ content }}</main>
      {% include footer.html %}
    </div>

    {% include link-previews.html wrapperQuerySelector=".note-content" %}

    <script>
    // Theme toggle: cycles auto → dark → light → auto
    (function() {
      var root = document.documentElement;
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      if (!btn || !icon) return;

      var moonSVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      var sunSVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';

      var saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') {
        root.setAttribute('data-theme', saved);
      }
      updateIcon();

      btn.addEventListener('click', function() {
        var current = root.getAttribute('data-theme');
        if (!current) {
          root.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        } else if (current === 'dark') {
          root.setAttribute('data-theme', 'light');
          localStorage.setItem('theme', 'light');
        } else {
          root.removeAttribute('data-theme');
          localStorage.removeItem('theme');
        }
        updateIcon();
      });

      function updateIcon() {
        var theme = root.getAttribute('data-theme');
        if (theme === 'dark') {
          icon.innerHTML = sunSVG;
        } else if (theme === 'light') {
          icon.innerHTML = moonSVG;
        } else {
          icon.innerHTML = window.matchMedia('(prefers-color-scheme: dark)').matches ? sunSVG : moonSVG;
        }
      }
    })();

    // Hamburger menu toggle (panel + overlay)
    (function() {
      var hamburger = document.getElementById('nav-hamburger');
      var navEl = document.querySelector('.site-nav');
      var overlay = document.getElementById('nav-overlay');
      var panel = document.getElementById('nav-panel');
      if (!hamburger || !navEl) return;

      function toggleMenu() {
        var isOpen = navEl.classList.toggle('nav-open');
        hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      }

      function closeMenu() {
        navEl.classList.remove('nav-open');
        hamburger.setAttribute('aria-expanded', 'false');
      }

      hamburger.addEventListener('click', toggleMenu);

      // Close on overlay click
      if (overlay) overlay.addEventListener('click', closeMenu);

      // Close on link click
      if (panel) {
        panel.querySelectorAll('a').forEach(function(link) {
          link.addEventListener('click', closeMenu);
        });
      }

      // Close on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && navEl.classList.contains('nav-open')) {
          closeMenu();
        }
      });
    })();
    </script>
  </body>
</html>
